<div class="flex h-screen w-full bg-slate-950 overflow-hidden relative">
  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10">
    <!-- Header -->
    <header class="px-8 py-6 border-b border-slate-800/50 bg-slate-950/80 backdrop-blur-sm z-10">
      <div class="flex flex-col gap-1">
        <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-brand-200 to-purple-200">
          AI Model Discovery
        </h1>
        <p class="text-slate-400 text-sm">Explore and integrate supported models from our unified relay.</p>
      </div>
    </header>

    <!-- Toolbar -->
    <app-model-filter (filterChange)="handleFilterChange($event)"></app-model-filter>

    <!-- Content Area (Split: Grid + Code) -->
    <div class="flex-1 overflow-auto custom-scrollbar p-6">
      <div class="flex gap-6 h-full flex-col xl:flex-row">
        
        <!-- Model Grid -->
        <div class="flex-1 overflow-visible">
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-2 2xl:grid-cols-3 gap-4 pb-20">
            @for (model of filteredModels(); track model.id) {
              <div 
                (click)="selectModel(model.id)"
                [class.ring-2]="store.selectedModelId() === model.id || model.versions?.includes(store.selectedModelId()!)"
                class="cursor-pointer rounded-xl transition-all duration-200 ring-brand-500/50 hover:scale-[1.02]">
                <app-model-card 
                  [model]="model" 
                  [selectedModelId]="store.selectedModelId()"
                  [preferredVersion]="preferredVersions()[model.id]"
                  [isCalculatorOpen]="calculatorModelId() === model.id"
                  (modelSelect)="selectModel($event)"
                  (calculatorToggle)="toggleCalculator($event)">
                </app-model-card>
              </div>
            } @empty {
              <div class="col-span-full py-12 text-center">
                <p class="text-slate-500">No models found matching your criteria.</p>
              </div>
            }
          </div>
        </div>

        <!-- Sticky Code Block (Desktop) or Bottom (Mobile) -->
        <div class="w-full xl:w-5/12 xl:max-w-[450px] flex-shrink-0">
          <div class="sticky top-0 h-[500px]">
             @if (store.selectedModelId(); as selectedId) {
               <app-code-block 
                  [modelId]="selectedId" 
                  [backendMode]="store.backendMode()">
               </app-code-block>
             } @else {
               <div class="glass h-full rounded-xl flex items-center justify-center p-8 border border-slate-700/30 border-dashed">
                 <div class="text-center text-slate-500">
                   <p class="text-sm">Select a model to generate integration code.</p>
                 </div>
               </div>
             }
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
