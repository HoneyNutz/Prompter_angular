<div class="glass border border-slate-700/50 rounded-xl overflow-hidden flex flex-col h-full">
  <!-- Header / Controls -->
  <div class="flex items-center justify-between px-4 py-2 bg-slate-900/80 border-b border-slate-700/50">
    <div class="flex items-center gap-2">
      <lucide-icon aria-hidden="true" [img]="TerminalIcon" class="w-4 h-4 text-slate-500"></lucide-icon>
      <span class="text-xs font-mono text-slate-400">{{ headerText() }}</span>
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-2">
      <!-- Settings Toggle -->
       <button 
        (click)="showParams.set(!showParams())"
        [attr.aria-expanded]="showParams()"
        aria-label="Toggle parameters"
        [class.bg-slate-800]="showParams()"
        [class.text-brand-300]="showParams()"
        class="p-1.5 rounded-md text-slate-500 hover:bg-slate-800 transition-colors">
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>

      <!-- Language Toggles -->
      <div role="tablist" aria-label="Code languages" class="flex bg-slate-950 rounded-lg p-0.5 border border-slate-800">
        @for (lang of ['python', 'r', 'typescript', 'csharp', 'curl']; track lang) {
          <button 
            role="tab"
            [attr.aria-selected]="language() === lang"
            (click)="setLanguage($any(lang))"
            [class.bg-slate-800]="language() === lang"
            [class.text-brand-300]="language() === lang"
            [class.text-slate-500]="language() !== lang"
            class="px-3 py-1 text-[10px] font-medium uppercase tracking-wider rounded-md transition-all">
            {{ lang === 'typescript' ? 'TS' : lang === 'csharp' ? 'C#' : lang }}
          </button>
        }
      </div>
    </div>
  </div>

  <!-- Parameter Controls Panel -->
  <div class="bg-slate-900/40 border-b border-slate-800/50 transition-all overflow-hidden" 
       [style.height]="showParams() ? 'auto' : '0px'"
       [class.py-3]="showParams()"
       [class.px-4]="showParams()">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="temperature_slider" class="text-[10px] items-center flex gap-2 font-medium text-slate-500 mb-1.5 uppercase tracking-wider">
          Temperature
          <span class="text-xs text-brand-400 font-mono">{{ temperature() }}</span>
        </label>
        <input 
          id="temperature_slider"
          aria-label="Temperature"
          type="range" 
          min="0" max="2" step="0.1" 
          [value]="temperature()" 
          (input)="temperature.set($any($event.target).value)" 
          class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-brand-500">
      </div>
       <div>
        <label for="topp_slider" class="text-[10px] items-center flex gap-2 font-medium text-slate-500 mb-1.5 uppercase tracking-wider">
          Top P
          <span class="text-xs text-brand-400 font-mono">{{ top_p() }}</span>
        </label>
        <input 
          id="topp_slider"
          aria-label="Top P"
          type="range" 
          min="0" max="1" step="0.05" 
          [value]="top_p()" 
          (input)="top_p.set($any($event.target).value)" 
          class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-brand-500">
      </div>
    </div>
  </div>

  <!-- Code Area -->
  <div class="relative group flex-1 bg-[#0d1117] overflow-hidden">
    <!-- Copy Button -->
    <button 
      (click)="copyCode()"
      aria-label="Copy code block to clipboard"
      class="absolute top-3 right-3 p-2 rounded-lg bg-slate-800/50 text-slate-400 opacity-0 group-hover:opacity-100 focus-visible:opacity-100 transition-all hover:bg-slate-700 hover:text-white z-10 focus:outline-none focus:ring-2 focus:ring-brand-500">
      @if (copied()) {
        <lucide-icon aria-hidden="true" [img]="CheckIcon" class="w-4 h-4 text-green-400"></lucide-icon>
      } @else {
        <lucide-icon aria-hidden="true" [img]="CopyIcon" class="w-4 h-4"></lucide-icon>
      }
    </button>

    <div class="h-full overflow-auto custom-scrollbar p-0">
      <pre class="h-full m-0"><code [highlight]="codeSnippet()" [language]="language()" class="text-sm font-mono leading-relaxed h-full"></code></pre>
    </div>
  </div>
</div>
