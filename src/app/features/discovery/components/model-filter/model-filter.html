<div class="w-full flex flex-col xl:flex-row xl:items-center gap-4 bg-slate-900/50 border-b border-slate-700/50 p-4 backdrop-blur-sm sticky top-0 z-30">
  
  <!-- Search (Flex Grow) -->
  <div class="relative flex-1 min-w-[200px]">
    <lucide-icon [img]="SearchIcon" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></lucide-icon>
    <input 
      type="text" 
      [ngModel]="searchTerm()" 
      (ngModelChange)="updateSearch($event)"
      placeholder="Search models..." 
      style="padding-left: 3rem;"
      class="w-full bg-slate-950 border border-slate-700/50 rounded-lg py-2 pr-3 text-sm text-slate-200 focus:outline-none focus:border-brand-500/50 focus:ring-1 focus:ring-brand-500/50 placeholder:text-slate-600 transition-all">
  </div>

  <!-- Filters & Toggles Group -->
  <div class="flex flex-wrap items-center gap-4">
    
    <!-- Kind Filters -->
    <div class="flex items-center gap-2 bg-slate-950/50 p-1 rounded-lg border border-slate-800/50">
      @for (kind of ['Text', 'Image', 'Audio', 'Embedding']; track kind) {
        <label class="flex items-center gap-2 cursor-pointer px-3 py-1.5 rounded-md hover:bg-slate-800 transition-all select-none"
               [class.bg-slate-800]="kinds()[kind]"
               [class.text-brand-300]="kinds()[kind]"
               [class.text-slate-500]="!kinds()[kind]">
           <input type="checkbox" [checked]="kinds()[kind]" (change)="toggleKind(kind)" class="sr-only">
           <span class="text-xs font-medium uppercase tracking-wider">{{ kind }}</span>
        </label>
      }
    </div>

    <div class="w-px h-8 bg-slate-800 hidden xl:block"></div>

    <!-- Backend Toggle -->
    <div class="flex bg-slate-950 p-1 rounded-lg border border-slate-800">
      <button 
        (click)="toggleBackend('External')"
        [class.bg-slate-800]="store.backendMode() === 'External'"
        [class.text-white]="store.backendMode() === 'External'"
        class="flex items-center gap-2 py-1.5 px-3 rounded-md text-xs font-medium text-slate-500 hover:text-white transition-colors">
        <lucide-icon [img]="GlobeIcon" class="w-3 h-3"></lucide-icon>
        External
      </button>
      <button 
        (click)="toggleBackend('Internal')"
        [class.bg-brand-900]="store.backendMode() === 'Internal'"
        [class.text-brand-100]="store.backendMode() === 'Internal'"
        class="flex items-center gap-2 py-1.5 px-3 rounded-md text-xs font-medium text-slate-500 hover:text-brand-200 transition-colors">
        <lucide-icon [img]="ServerIcon" class="w-3 h-3"></lucide-icon>
        Internal
      </button>
    </div>

  </div>
</div>
