<div class="w-full max-w-md mx-auto">
  <div class="glass-card mb-6 text-center">
    <div class="w-12 h-12 rounded-full bg-brand-900/30 text-brand-400 flex items-center justify-center mx-auto mb-4 border border-brand-500/20">
      <lucide-icon [img]="KeyIcon" class="w-6 h-6"></lucide-icon>
    </div>
    <h3 class="text-xl font-bold text-slate-100 mb-2">Enter API Key</h3>
    <p class="text-slate-400 text-sm mb-6">Enter your API key to view your usage statistics and cost analysis.</p>

    <div class="relative flex items-center">
      <input 
        type="password" 
        [ngModel]="key()" 
        (ngModelChange)="key.set($event)"
        (keyup.enter)="handleSubmit()"
        placeholder="sk-..." 
        class="w-full bg-slate-950 border border-slate-700/50 rounded-lg py-3 pl-4 pr-12 text-slate-200 focus:outline-none focus:border-brand-500/50 focus:ring-1 focus:ring-brand-500/50 transition-all shadow-inner">
      
      <button 
        (click)="handleSubmit()"
        [disabled]="key().length < 4"
        class="absolute right-1.5 top-1.5 bottom-1.5 aspect-square rounded-md bg-brand-600 hover:bg-brand-500 disabled:opacity-50 disabled:cursor-not-allowed text-white flex items-center justify-center transition-colors">
        <lucide-icon [img]="ArrowRightIcon" class="w-4 h-4"></lucide-icon>
      </button>
    </div>
  </div>
</div>
